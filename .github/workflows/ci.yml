name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  linux-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: cachix/install-nix-action@v31.10.5
      - uses: cachix/cachix-action@v17
        with:
          name: henrytill
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix build -L .#all -o result-all

  linux-flake-static:
    needs: linux-flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: cachix/install-nix-action@v31.10.5
      - uses: cachix/cachix-action@v17
        with:
          name: henrytill
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix build -L .#all-static -o result-all-static
      - uses: actions/upload-artifact@v7
        with:
          name: hbt-x86_64-unknown-linux-musl
          path: result-all-static/bin/hbt
      - uses: actions/upload-artifact@v7
        with:
          name: pinboard-client-x86_64-unknown-linux-musl
          path: result-all-static/bin/pinboard-client
